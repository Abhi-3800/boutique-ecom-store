<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Default Title (fallback before React loads) -->
    <title>Nodima Designs | Elegance in Every Stitch</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Nodima Designs is a premium fashion brand offering elegant, handcrafted apparel where every stitch reflects sophistication and timeless style."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="canonical" href="https://nodima-designs.com" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (Google / WhatsApp / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nodima Designs | Elegance in Every Stitch" />
    <meta
      property="og:description"
      content="Discover premium handcrafted fashion at Nodima Designs, where elegance is woven into every stitch."
    />
    <meta property="og:url" content="https://nodima-designs.com" />
    <meta property="og:image" content="https://nodima-designs.com/og-image.jpg" />
  </head>

  <body class="bg-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
